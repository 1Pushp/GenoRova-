services:
  - type: web
    name: genorova-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --app-dir /opt/render/project/src
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
