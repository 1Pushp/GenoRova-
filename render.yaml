services:
  - type: web
    name: genorova
    runtime: python
    rootDir: genorova
    healthCheckPath: /health
    buildCommand: cd ../app/frontend && npm ci && npm run build && cd ../../genorova && pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.18.0
      - key: GENOROVA_LOG_LEVEL
        value: INFO
      - key: VITE_API_BASE_URL
        value: ""
